; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Dependances communes a la logique pure (formatage JSON, topic).
; ArduinoJson compile aussi bien sur cible embarquee que native.
[common]
lib_deps_pure =
    bblanchon/ArduinoJson@^7.1.0

; ── Cible embarquee : ESP8266 (ESP-12E) ─────────────────────────
[env:esp12e]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
lib_deps =
    ${common.lib_deps_pure}
    knolleary/PubSubClient@^2.8
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

; ── Cible native : tests unitaires logique pure (sans hardware) ──
; `pio test -e native` execute les tests Unity sur la machine hote.
; Seuls les modules sans dependance Arduino sont testes ici
; (measurement_json, topic) via le filtre de sources.
[env:native]
platform = native
test_framework = unity
lib_deps = ${common.lib_deps_pure}
build_flags = -std=c++17
; Lier les sources du projet aux tests (sinon measurement_json.cpp n'est
; pas compile et le lien echoue).
test_build_src = yes
; Ne compiler en natif QUE la logique pure (pas les modules Arduino :
; sensor/wifi/mqtt/clock/main incluent des headers hardware).
build_src_filter =
    +<measurement_json.cpp>
