server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── En-têtes de sécurité (CDC §V.2, OWASP) ────────────────────────────────
  # CSP : le build Vite ne contient AUCUN script/style inline (vérifié) → on garde
  # script-src 'self'. 'unsafe-inline' reste nécessaire en style-src car
  # Radix/recharts posent des attributs style="" au runtime (risque XSS faible).
  # connect-src : 'self' + https: autorise l'API backend-central (origine HTTPS
  # définie au déploiement). À RESTREINDRE à l'origine exacte de l'API en prod
  # réelle (ex. connect-src 'self' https://api.futurekawa.example).
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
