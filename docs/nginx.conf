server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # VitePress (cleanUrls) : /getting-started → getting-started.html. On résout
  # l'URL propre, puis le dossier, sinon la 404 statique de VitePress.
  location / {
    try_files $uri $uri.html $uri/ /404.html;
  }

  error_page 404 /404.html;

  # ── En-têtes de sécurité ──────────────────────────────────────────────────
  # Pas de CSP stricte ici : VitePress injecte des scripts inline (anti-FOUC dark
  # mode) que `script-src 'self'` casserait, et les hashes cassent à chaque maj.
  # Site de doc statique PUBLIC (aucune entrée utilisateur, ni auth, ni secret)
  # → surface XSS quasi nulle ; on garde les en-têtes sûrs et peu coûteux.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
