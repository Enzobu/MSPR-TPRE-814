services:
  mariadb-central:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_CENTRAL_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    expose:
      - 3306
    volumes:
      - ${VOLUME_BASE_PATH}/mariadb-central-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  mariadb-pays:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_PAYS_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    expose:
      - 3306
    volumes:
      - ${VOLUME_BASE_PATH}/mariadb-pays-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  mosquitto-pays:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/mosquitto/entrypoint.sh"]
    environment:
      COUNTRY_CODE: ${COUNTRY_CODE}
      MOSQUITTO_IOT_USERNAME: ${MQTT_IOT_USERNAME}
      MOSQUITTO_IOT_PASSWORD: ${MQTT_IOT_PASSWORD}
      MOSQUITTO_BACKEND_USERNAME: ${MQTT_BACKEND_USERNAME}
      MOSQUITTO_BACKEND_PASSWORD: ${MQTT_BACKEND_PASSWORD}
    ports:
      - "${MOSQUITTO_PAYS_PORT}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/entrypoint.sh:/mosquitto/entrypoint.sh:ro
      - ${VOLUME_BASE_PATH}/mosquitto-pays-data:/mosquitto/data

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    restart: unless-stopped
    environment:
      PMA_HOSTS: ${PHPMYADMIN_HOSTS}
      PMA_VERBOSES: ${PHPMYADMIN_VERBOSES}
      PMA_USER: ${MARIADB_USER}
      PMA_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${PHPMYADMIN_WEB_PORT}:80"
    depends_on:
      mariadb-central:
        condition: service_healthy
      mariadb-pays:
        condition: service_healthy

  backend-pays:
    build:
      context: .
      dockerfile: apps/backend-pays/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      COUNTRY_CODE: ${COUNTRY_CODE}
      DATABASE_URL: ${DATABASE_PAYS_URL}
      MQTT_URL: ${MQTT_PAYS_URL}
      MQTT_CLIENT_ID: backend-pays
      MQTT_USERNAME: ${MQTT_BACKEND_USERNAME}
      MQTT_PASSWORD: ${MQTT_BACKEND_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${ALERT_SMTP_FROM}
      ALERT_RECIPIENT: ${ALERT_RECIPIENT}
      LOG_LEVEL: info
      CORS_ORIGIN: ${BACKEND_PAYS_CORS_ORIGIN}
      SENTRY_DSN: ${BACKEND_PAYS_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    expose:
      - 3000
    depends_on:
      mariadb-pays:
        condition: service_healthy
      mosquitto-pays:
        condition: service_started

  backend-central:
    build:
      context: .
      dockerfile: apps/backend-central/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_CENTRAL_URL}
      BACKEND_PAYS_BR_URL: ${BACKEND_PAYS_INTERNAL_URL}
      BACKEND_PAYS_EC_URL: ${BACKEND_PAYS_INTERNAL_URL}
      BACKEND_PAYS_CO_URL: ${BACKEND_PAYS_INTERNAL_URL}
      PAYS_REQUEST_TIMEOUT_MS: 3000
      PAYS_REQUEST_RETRIES: 2
      CORS_ORIGIN: ${BACKEND_CENTRAL_CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      LOG_LEVEL: info
      SENTRY_DSN: ${BACKEND_CENTRAL_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    ports:
      - "${BACKEND_CENTRAL_PORT}:3000"
    depends_on:
      mariadb-central:
        condition: service_healthy
      backend-pays:
        condition: service_started

  frontend-web:
    build:
      context: .
      dockerfile: apps/frontend-web/Dockerfile
      args:
        VITE_API_URL: ${BACKEND_CENTRAL_URL}
        VITE_SENTRY_DSN: ${FRONTEND_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_WEB_PORT}:8080"
    depends_on:
      backend-central:
        condition: service_started

  # Site de documentation utilisateur (VitePress, ADR-0009/0010). Statique et
  # autonome : aucune dépendance runtime. Buildé avec la stack (donc en CI via
  # docker compose build) → pas de job CI dédié.
  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    restart: unless-stopped
    ports:
      - "${DOCS_WEB_PORT}:8080"
