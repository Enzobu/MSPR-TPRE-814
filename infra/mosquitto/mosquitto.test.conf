# TEST ONLY — broker Mosquitto jetable pour les tests d'intégration MQTT (#28).
# Anonyme + sans persistance + logs stdout : aucune donnée conservée, repart à
# neuf à chaque `up`. NE PAS utiliser hors tests (la conf de dev/prod impose
# auth + persistance : infra/mosquitto/mosquitto.conf).
listener 1883

# TEST ONLY : connexions anonymes acceptées pour simplifier les tests (pas de
# password_file). La conf de prod (mosquitto.conf) refuse l'anonyme.
allow_anonymous true

# TEST ONLY : pas de persistance, le broker ne garde aucun message entre deux runs.
persistence false

# Logs structurés vers stdout (récupérés par Docker pendant les tests).
log_dest stdout
