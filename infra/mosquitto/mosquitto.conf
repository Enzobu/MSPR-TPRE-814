# Broker Mosquitto — 1 instance par pays (FutureKawa).
# Voir docs/architecture/mqtt.md (topics/payload : ADR-0003).

listener 1883 0.0.0.0

# Auth : aucune connexion anonyme (rules/07-security). Le password_file et l'acl_file
# sont générés au démarrage par entrypoint.sh à partir des variables d'environnement
# (users de dev). En prod : TLS + secrets gérés hors-image (hors scope, #50).
allow_anonymous false
password_file /mosquitto/config/passwordfile
acl_file /mosquitto/config/aclfile

# Persistance (volume Docker) — conserve les messages retained, dont le statut
# online/offline des capteurs (LWT retain, ADR-0003).
persistence true
persistence_location /mosquitto/data/

# Logs structurés vers stdout (récupérés par Docker / la supervision).
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
