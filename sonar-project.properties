# sonar-project.properties

sonar.projectKey=Enzobu_MSPR-TPRE-814_328a41f3-b493-4fed-8e21-11fbc69b8ee6

# Sources analysées
sonar.sources=apps/backend-central,apps/backend-pays,apps/frontend-web,apps/iot,packages

# Tests
sonar.tests=apps/backend-central,apps/backend-pays,apps/frontend-web,apps/iot,packages

sonar.test.inclusions=\
**/*.test.ts,\
**/*.test.tsx,\
**/*.spec.ts,\
**/*.spec.tsx,\
**/*.e2e-spec.ts,\
**/*.test.js,\
**/*.spec.js,\
**/__tests__/**,\
**/tests/e2e/**,\
apps/iot/test/**

# Exclusions globales
sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/build/**,\
**/.next/**,\
**/.vite/**,\
**/.turbo/**,\
**/coverage/**,\
**/.pio/**,\
**/vendor/**,\
**/*.lock,\
**/pnpm-lock.yaml,\
**/package-lock.json,\
**/yarn.lock,\
**/*.min.js,\
**/*.test.ts,\
**/*.test.tsx,\
**/*.spec.ts,\
**/*.spec.tsx,\
**/*.test.js,\
**/*.spec.js,\
**/*.e2e-spec.ts,\
**/__tests__/**,\
**/tests/e2e/**,\
**/prisma/migrations/**,\
**/generated/**,\
**/.generated/**,\
**/generated/prisma/**,\
.agents/**,\
.claude/**,\
.codex/**,\
.husky/**,\
.vscode/**,\
.github/**,\
bruno/**,\
docs/**

# Coverage JS / TS
sonar.javascript.lcov.reportPaths=\
apps/backend-central/coverage/lcov.info,\
apps/backend-pays/coverage/lcov.info,\
apps/frontend-web/coverage/lcov.info,\
packages/nest-common/coverage/lcov.info

# Fichiers à ne pas compter dans la couverture
# Les *.dto.ts sont déclaratifs (classe + décorateurs Swagger/validation, aucune
# logique ni branche) → exclus, on ne les teste pas unitairement (règle 04).
sonar.coverage.exclusions=\
**/*.config.js,\
**/*.config.ts,\
**/*.config.mjs,\
**/*.d.ts,\
**/*.dto.ts,\
**/main.ts,\
**/main.tsx,\
**/index.ts,\
**/vite-env.d.ts,\
**/components/ui/**,\
**/prisma/**,\
**/generated/**,\
**/.generated/**,\
**/generated/prisma/**,\
apps/iot/**,\
docs/**,\
bruno/**

# Duplication : on évite de pénaliser les fichiers générés ou peu pertinents
sonar.cpd.exclusions=\
**/prisma/migrations/**,\
**/generated/**,\
**/.generated/**,\
**/generated/prisma/**,\
**/*.d.ts,\
apps/iot/**

# PlatformIO / C++
# À décommenter seulement le fichier compile_commands.json est généré avant le scan.
# Commande : cd apps/iot && pio run -t compiledb
# sonar.cfamily.compile-commands=apps/iot/compile_commands.json
